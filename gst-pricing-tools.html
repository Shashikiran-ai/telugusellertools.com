<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GST & Pricing Tools - Telugu Ecom Tools</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f7fb;
margin:0;
}

header{
background:#1565e8;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:900px;
margin:30px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h2{
text-align:center;
color:#1565e8;
}

input{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:8px;
}

button{
width:100%;
padding:14px;
background:#1565e8;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.result{
margin-top:20px;
padding:20px;
background:#eef5ff;
border-radius:10px;
line-height:1.8;
font-size:18px;
}

.home{
display:inline-block;
margin-top:20px;
padding:12px 20px;
background:#28a745;
color:white;
text-decoration:none;
border-radius:8px;
}
</style>
</head>

<body>

<header>
<h1>📦 Telugu Ecom Tools</h1>
<p>GST & Pricing Calculator</p>
</header>

<div class="container">

<h2>Calculate GST & Final Selling Price</h2>

<label>Product Cost (₹)</label>
<input type="number" id="cost">

<label>Desired Profit (₹)</label>
<input type="number" id="profit">

<label>GST Rate (%)</label>
<input type="number" id="gst" value="18">

<button onclick="calculateGST()">
Calculate
</button>

<div class="result" id="result">
Results will appear here...
</div>

<a href="index.html" class="home">🏠 Back to Home</a>

</div>

<script>

function calculateGST(){

let cost =
parseFloat(document.getElementById("cost").value) || 0;

let profit =
parseFloat(document.getElementById("profit").value) || 0;

let gst =
parseFloat(document.getElementById("gst").value) || 0;

let basePrice = cost + profit;

let gstAmount = basePrice * gst / 100;

let finalPrice = basePrice + gstAmount;

document.getElementById("result").innerHTML =

"Product Cost: ₹ " + cost.toFixed(2) + "<br><br>" +

"Desired Profit: ₹ " + profit.toFixed(2) + "<br><br>" +

"GST Amount: ₹ " + gstAmount.toFixed(2) + "<br><br>" +

"<b>Final Selling Price: ₹ " + finalPrice.toFixed(2) + "</b>";

}

</script>

</body>
</html>
