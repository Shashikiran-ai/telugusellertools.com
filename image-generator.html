<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Creator - Telugu Ecom Tools</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f7fb;
margin:0;
}

header{
background:#1565e8;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:900px;
margin:30px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;
}

button{
padding:12px 20px;
background:#1565e8;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.canvas-container{
text-align:center;
margin-top:20px;
}

canvas{
border:2px solid #ddd;
max-width:100%;
}
#gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.image-card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.15);
text-align:center;
}

.image-card canvas{
width:100%;
border-radius:8px;
}

.download-btn{
width:100%;
margin-top:10px;
background:#28a745;
color:white;
border:none;
padding:12px;
border-radius:8px;
cursor:pointer;
}    

.home{
display:inline-block;
margin-top:20px;
padding:12px 20px;
background:#28a745;
color:white;
text-decoration:none;
border-radius:8px;
}
</style>
</head>
<body>

<header>
<h1>🖼️ Telugu Ecom Tools</h1>
<p>Product Image Creator</p>
</header>

<div class="container">

<label>Upload Product Image</label>
<input type="file" id="imageUpload" accept="image/png,image/jpeg">

<button onclick="generateImages()">
🚀 Generate 10 Images
</button>

<h2 style="margin-top:30px;">Generated Images</h2>

<div id="gallery"></div>

<br>

<a href="index.html" class="home">
🏠 Back to Home
</a>

</div>

<script>

let uploadedImage = null;

const backgrounds = [
    {name:"White", color:"#ffffff"},
    {name:"Black", color:"#000000"},
    {name:"Pink", color:"#ffd6e7"},
    {name:"Blue", color:"#dbeafe"},
    {name:"Yellow", color:"#fff8c5"},
    {name:"Green", color:"#d1fae5"},
    {name:"Purple", color:"#ede9fe"},
    {name:"Beige", color:"#f5f5dc"},
    {name:"Orange", color:"#ffe5b4"},
    {name:"Gray", color:"#e5e7eb"}
];

document.getElementById("imageUpload").addEventListener("change", function(e){

const file = e.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(event){

uploadedImage = new Image();

uploadedImage.src = event.target.result;

};

reader.readAsDataURL(file);

});

function generateImages(){

if(!uploadedImage){

alert("Please upload an image first.");

return;

}

if(uploadedImage.complete){

drawImages();

}else{

uploadedImage.onload = drawImages;

}

function drawImages(){

const gallery = document.getElementById("gallery");

gallery.innerHTML = "";

backgrounds.forEach(function(bg){

const card = document.createElement("div");
card.className = "image-card";

const title = document.createElement("h3");
title.innerText = bg.name + " Background";

const canvas = document.createElement("canvas");
canvas.width = 1000;
canvas.height = 1000;

const ctx = canvas.getContext("2d");

ctx.fillStyle = bg.color;
ctx.fillRect(0,0,1000,1000);

let w = uploadedImage.width;
let h = uploadedImage.height;

const maxWidth = 820;
const maxHeight = 820;

const scale = Math.min(maxWidth / w, maxHeight / h, 1);

w = w * scale;
h = h * scale;

const x = (1000 - w) / 2;
const y = (1000 - h) / 2;

ctx.imageSmoothingEnabled = true;
ctx.imageSmoothingQuality = "high";

ctx.drawImage(uploadedImage, x, y, w, h);
const btn = document.createElement("button");
btn.className = "download-btn";
btn.innerText = "Download";

btn.onclick = function(){

const link = document.createElement("a");

link.download = "Telugu-Ecom-" + bg.name + ".png";

link.href = canvas.toDataURL("image/png");

link.click();

};

card.appendChild(title);
card.appendChild(canvas);
card.appendChild(btn);

gallery.appendChild(card);

});

};

}

</script>

</body>
</html>
