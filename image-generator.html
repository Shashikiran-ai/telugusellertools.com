<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Creator - Telugu Ecom Tools</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f7fb;
margin:0;
}

header{
background:#1565e8;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:900px;
margin:30px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;
}

button{
padding:12px 20px;
background:#1565e8;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.canvas-container{
text-align:center;
margin-top:20px;
}

canvas{
border:2px solid #ddd;
max-width:100%;
}

.home{
display:inline-block;
margin-top:20px;
padding:12px 20px;
background:#28a745;
color:white;
text-decoration:none;
border-radius:8px;
}
</style>
</head>
<body>

<header>
<h1>🖼️ Telugu Ecom Tools</h1>
<p>Product Image Creator</p>
</header>

<div class="container">

<label>Upload Product Image</label>
<input type="file" id="imageUpload">

<label>Product Title</label>
<input type="text" id="title" placeholder="Enter Product Title">

<label>Price</label>
<input type="text" id="price" placeholder="₹299">

<button onclick="generateImage()">
Generate Image
</button>

<div class="canvas-container">
<canvas id="canvas" width="800" height="800"></canvas>
</div>

<button onclick="downloadImage()">
Download Image
</button>

<br>

<a href="index.html" class="home">
🏠 Back to Home
</a>

</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let uploadedImage = null;

document.getElementById("imageUpload")
.addEventListener("change", function(e){

const reader = new FileReader();

reader.onload = function(event){

uploadedImage = new Image();

uploadedImage.onload = function(){

ctx.drawImage(uploadedImage,0,0,800,800);

};

uploadedImage.src = event.target.result;

};

reader.readAsDataURL(e.target.files[0]);

});

function generateImage(){

ctx.clearRect(0,0,800,800);

ctx.fillStyle="#ffffff";
ctx.fillRect(0,0,800,800);

if(uploadedImage){

ctx.drawImage(uploadedImage,100,80,600,500);

}

ctx.fillStyle="#1565e8";
ctx.fillRect(0,620,800,180);

ctx.fillStyle="#ffffff";
ctx.font="bold 40px Arial";

ctx.fillText(
document.getElementById("title").value,
40,
690
);

ctx.font="bold 50px Arial";

ctx.fillText(
document.getElementById("price").value,
40,
760
);

ctx.fillStyle="red";
ctx.beginPath();
ctx.arc(680,120,80,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="white";
ctx.font="bold 28px Arial";
ctx.fillText("BEST",630,110);
ctx.fillText("SELLER",620,145);

}

function downloadImage(){

const link = document.createElement("a");

link.download = "telugu-ecom-image.png";

link.href = canvas.toDataURL();

link.click();

}

</script>

</body>
</html>
