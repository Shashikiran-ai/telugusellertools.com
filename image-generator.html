<body>

<header>
<h1>🖼️ Telugu Ecom Image Studio</h1>
<p>Generate 10 Product Images with Different Backgrounds</p>
</header>

<div class="container">

<label><b>Upload Product PNG Image</b></label>
<input type="file" id="imageUpload" accept="image/png,image/jpeg">

<button onclick="generateImages()">
🚀 Generate 10 Images
</button>

<br><br>

<div id="gallery"></div>

<br>

<a href="index.html" class="home">
🏠 Back to Home
</a>

</div>

<style>

#gallery{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:20px;

margin-top:30px;

}

.image-card{

background:white;

border-radius:15px;

padding:15px;

box-shadow:0 5px 15px rgba(0,0,0,.15);

text-align:center;

}

.image-card canvas{

width:100%;

border-radius:10px;

border:1px solid #ddd;

}

.download-btn{

margin-top:15px;

background:#28a745;

color:white;

padding:10px 20px;

border:none;

border-radius:8px;

cursor:pointer;

width:100%;

font-size:16px;

}

.download-btn:hover{

background:#1d9b4d;

}

</style>

<script>

let uploadedImage = null;

const backgrounds = [
    {name:"White",color:"#ffffff"},
    {name:"Black",color:"#000000"},
    {name:"Pink",color:"#ffd6e7"},
    {name:"Blue",color:"#dbeafe"},
    {name:"Yellow",color:"#fff8c5"},
    {name:"Green",color:"#d1fae5"},
    {name:"Purple",color:"#ede9fe"},
    {name:"Beige",color:"#f5f5dc"},
    {name:"Orange",color:"#ffe5b4"},
    {name:"Gray",color:"#e5e7eb"}
];

document.getElementById("imageUpload").addEventListener("change",function(e){

const file=e.target.files[0];

if(!file) return;

const reader=new FileReader();

reader.onload=function(event){

uploadedImage=new Image();

uploadedImage.src=event.target.result;

}

reader.readAsDataURL(file);

});

function generateImages(){

if(!uploadedImage){

alert("Please upload a product image.");

return;

}

uploadedImage.onload=function(){

const gallery=document.getElementById("gallery");

gallery.innerHTML="";

backgrounds.forEach(function(bg,index){

const card=document.createElement("div");
card.className="image-card";

const canvas=document.createElement("canvas");
canvas.width=1000;
canvas.height=1000;

const ctx=canvas.getContext("2d");

ctx.fillStyle=bg.color;
ctx.fillRect(0,0,1000,1000);

/* ---------- IMAGE SIZE ---------- */

const maxWidth=700;
const maxHeight=700;

let w=uploadedImage.width;
let h=uploadedImage.height;

const ratio=Math.min(maxWidth/w,maxHeight/h);

w*=ratio;
h*=ratio;

const x=(1000-w)/2;
const y=(1000-h)/2;

ctx.drawImage(uploadedImage,x,y,w,h);

/* ---------- NAME ---------- */

const title=document.createElement("h3");

title.innerText=bg.name+" Background";

/* ---------- DOWNLOAD ---------- */

const btn=document.createElement("button");

btn.className="download-btn";

btn.innerText="Download";

btn.onclick=function(){

const link=document.createElement("a");

link.download=bg.name.toLowerCase()+"-image.png";

link.href=canvas.toDataURL("image/png");

link.click();

};

card.appendChild(title);

card.appendChild(canvas);

card.appendChild(btn);

gallery.appendChild(card);

});

};

}

</script>
