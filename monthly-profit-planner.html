<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Profit Planner</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f7fb;
margin:0;
}

header{
background:#1565e8;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:900px;
margin:30px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input{
width:100%;
padding:12px;
margin:8px 0 15px;
border:1px solid #ddd;
border-radius:8px;
}

button{
width:100%;
padding:15px;
background:#1565e8;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.result{
margin-top:20px;
padding:20px;
background:#eef5ff;
border-radius:10px;
line-height:2;
}

.home-btn{
display:inline-block;
margin-top:20px;
padding:12px 20px;
background:#28a745;
color:white;
text-decoration:none;
border-radius:8px;
}
</style>
</head>
<body>

<header>
<h1>📅 Monthly Profit Planner</h1>
<p>Plan Your E-commerce Business Growth</p>
</header>

<div class="container">

<label>Monthly Orders</label>
<input type="number" id="orders">

<label>Average Selling Price (₹)</label>
<input type="number" id="selling">

<label>Product Cost Per Order (₹)</label>
<input type="number" id="cost">

<label>Shipping Cost Per Order (₹)</label>
<input type="number" id="shipping">

<label>Packaging Cost Per Order (₹)</label>
<input type="number" id="packaging">

<label>Monthly Ad Cost (₹)</label>
<input type="number" id="ads">

<label>Return Rate (%)</label>
<input type="number" id="returns">

<label>Marketplace Fee (%)</label>
<input type="number" id="fee">

<button onclick="calculateProfit()">
Calculate Monthly Profit
</button>

<div class="result" id="result">
Results will appear here...
</div>

<a href="index.html" class="home-btn">
🏠 Back to Home
</a>

</div>

<script>

function calculateProfit(){

let orders = Number(document.getElementById("orders").value);
let selling = Number(document.getElementById("selling").value);
let cost = Number(document.getElementById("cost").value);
let shipping = Number(document.getElementById("shipping").value);
let packaging = Number(document.getElementById("packaging").value);
let ads = Number(document.getElementById("ads").value);
let returns = Number(document.getElementById("returns").value);
let fee = Number(document.getElementById("fee").value);

let revenue = orders * selling;
let productCost = orders * cost;
let shippingCost = orders * shipping;
let packagingCost = orders * packaging;

let returnLoss = revenue * (returns/100);
let marketplaceFee = revenue * (fee/100);

let totalExpenses =
productCost +
shippingCost +
packagingCost +
ads +
returnLoss +
marketplaceFee;

let netProfit = revenue - totalExpenses;
let yearlyProfit = netProfit * 12;

let margin = revenue > 0
? ((netProfit / revenue) * 100).toFixed(2)
: 0;

document.getElementById("result").innerHTML = `
📈 Monthly Revenue: ₹${revenue.toFixed(2)}<br>
📦 Product Cost: ₹${productCost.toFixed(2)}<br>
🚚 Shipping Cost: ₹${shippingCost.toFixed(2)}<br>
📦 Packaging Cost: ₹${packagingCost.toFixed(2)}<br>
🔄 Return Loss: ₹${returnLoss.toFixed(2)}<br>
💳 Marketplace Fee: ₹${marketplaceFee.toFixed(2)}<br>
📢 Ad Cost: ₹${ads.toFixed(2)}<br>
<hr>
💰 Net Monthly Profit: ₹${netProfit.toFixed(2)}<br>
📅 Estimated Yearly Profit: ₹${yearlyProfit.toFixed(2)}<br>
🎯 Profit Margin: ${margin}%`;
}

</script>

</body>
</html>
