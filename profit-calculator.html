<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telugu Ecom Tools - Profit Calculator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f4f7fc;
}

header{
background:linear-gradient(135deg,#0d6efd,#0056d6);
padding:20px;
text-align:center;
color:white;
}

header h1{
font-size:35px;
}

.container{
max-width:700px;
margin:40px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
color:#0d6efd;
}

.input-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#0d6efd;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#0056d6;
}

.result{
margin-top:25px;
padding:20px;
background:#f8f9fa;
border-radius:10px;
display:none;
}

.result p{
font-size:18px;
margin:10px 0;
}

.profit{
color:green;
font-weight:bold;
font-size:22px;
}

.loss{
color:red;
font-weight:bold;
font-size:22px;
}

.home-btn{
display:block;
text-align:center;
margin-top:20px;
text-decoration:none;
background:#28a745;
color:white;
padding:12px;
border-radius:8px;
font-weight:bold;
}

</style>
</head>

<body>

<header>
<h1>💰 Telugu Ecom Tools</h1>
<p>Profit Calculator</p>
</header>

<div class="container">

<h2>Calculate Your Product Profit</h2>

<div class="input-group">
<label>Product Cost (₹)</label>
<input type="number" id="cost">
</div>

<div class="input-group">
<label>Selling Price (₹)</label>
<input type="number" id="selling">
</div>

<div class="input-group">
<label>Shipping Cost (₹)</label>
<input type="number" id="shipping">
</div>

<div class="input-group">
<label>Packing Cost (₹)</label>
<input type="number" id="packing">
</div>

<div class="input-group">
<label>Ads Cost (₹)</label>
<input type="number" id="ads">
</div>

<div class="input-group">
<label>GST (%)</label>
<input type="number" id="gst" value="0">
</div>

<button onclick="calculateProfit()">
Calculate Profit
</button>

<div class="result" id="result">

<p>Total Expenses: ₹ <span id="expenses"></span></p>

<p>Net Profit: ₹ <span id="profit"></span></p>

<p>Profit Margin: <span id="margin"></span>%</p>

</div>

<a href="index.html" class="home-btn">
🏠 Back to Home
</a>

</div>

<script>

function calculateProfit(){

let cost =
parseFloat(document.getElementById("cost").value) || 0;

let selling =
parseFloat(document.getElementById("selling").value) || 0;

let shipping =
parseFloat(document.getElementById("shipping").value) || 0;

let packing =
parseFloat(document.getElementById("packing").value) || 0;

let ads =
parseFloat(document.getElementById("ads").value) || 0;

let gst =
parseFloat(document.getElementById("gst").value) || 0;

let gstAmount =
selling * gst / 100;

let totalExpenses =
cost + shipping + packing + ads + gstAmount;

let netProfit =
selling - totalExpenses;

let margin =
selling > 0 ?
(netProfit / selling) * 100 : 0;

document.getElementById("expenses").innerText =
totalExpenses.toFixed(2);

document.getElementById("profit").innerText =
netProfit.toFixed(2);

document.getElementById("margin").innerText =
margin.toFixed(2);

document.getElementById("result").style.display =
"block";

if(netProfit >= 0){
document.getElementById("profit").className =
"profit";
}
else{
document.getElementById("profit").className =
"loss";
}

}

</script>

</body>
</html>
