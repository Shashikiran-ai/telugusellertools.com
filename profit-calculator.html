<!DOCTYPE html>
<html>
<head>
<title>Profit Calculator</title>
<style>
body{
font-family:Arial;
background:#f4f7fc;
padding:30px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#0d6efd;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#0d6efd;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:22px;
font-weight:bold;
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h1>💰 Profit Calculator</h1>

<input type="number" id="cost" placeholder="Product Cost">

<input type="number" id="selling" placeholder="Selling Price">

<input type="number" id="shipping" placeholder="Shipping Cost">

<input type="number" id="packing" placeholder="Packing Cost">

<input type="number" id="ads" placeholder="Ads Cost">

<button onclick="calculateProfit()">
Calculate Profit
</button>

<div id="result"></div>

</div>

<script>

function calculateProfit(){

let cost =
Number(document.getElementById("cost").value);

let selling =
Number(document.getElementById("selling").value);

let shipping =
Number(document.getElementById("shipping").value);

let packing =
Number(document.getElementById("packing").value);

let ads =
Number(document.getElementById("ads").value);

let profit =
selling - cost - shipping - packing - ads;

document.getElementById("result").innerHTML =
"Net Profit = ₹" + profit;

}

</script>

</body>
</html>
